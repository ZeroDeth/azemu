version: 2

project_name: azemu

before:
  hooks:
    - go mod tidy

builds:
  - id: azemu
    main: ./cmd/azemu
    binary: azemu
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: azemu
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

# Single-arch (linux/amd64) docker image. Multi-arch (add linux/arm64
# and a docker_manifests block) is tracked as a follow-up.
dockers:
  - id: azemu-linux-amd64
    ids:
      - azemu
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/zerodeth/azemu:{{ .Version }}"
      - "ghcr.io/zerodeth/azemu:latest"
    dockerfile: Dockerfile.release
    use: docker
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/ZeroDeth/azemu"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.licenses=MIT"

checksum:
  name_template: "checksums.txt"

changelog:
  use: github-native

release:
  github:
    owner: ZeroDeth
    name: azemu
  prerelease: auto
