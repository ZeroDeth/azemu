      "terraform": {
        "pkg-path": "terraform",
        "version": "^1.14"
      },
      "tflint": {
        "pkg-path": "tflint"
      }
    },
    "vars": {
      "ARM_CLIENT_ID": "00000000-0000-0000-0000-000000000002",
      "ARM_CLIENT_SECRET": "azemu-mock-secret",
      "ARM_METADATA_HOSTNAME": "127.0.0.1:4567",
      "ARM_SUBSCRIPTION_ID": "00000000-0000-0000-0000-000000000000",
      "ARM_TENANT_ID": "00000000-0000-0000-0000-000000000001",
      "AZEMU_ARM_PORT": "4566",
      "AZEMU_CERT_PATH": ".azemu/cert-bundle.pem",
      "AZEMU_META_PORT": "4567",
      "TF_DIR": "test/terraform"
    },
    "hook": {
      "on-activate": "  # Ensure the persistent cert bundle directory exists. The bundle file\n  # itself is generated by azemu on first start; the directory is\n  # gitignored so each contributor's machine has its own.\n  mkdir -p .azemu\n\n  # Auto-install the project pre-commit hook into .git/hooks/pre-commit\n  # the first time a contributor activates the env. Idempotent — running\n  # again is a fast no-op.\n  if [ -f .pre-commit-config.yaml ] && [ ! -f .git/hooks/pre-commit ]; then\n    pre-commit install >/dev/null 2>&1 && \\\n      echo \"✔ pre-commit hook installed (.git/hooks/pre-commit)\" || \\\n      echo \"✘ pre-commit install failed; run manually with: pre-commit install\"\n  fi\n\n  # Convenience hint if azemu is already running and a cert bundle exists.\n  if pgrep -f 'bin/azemu' >/dev/null 2>&1 && [ -f .azemu/cert-bundle.pem ]; then\n    echo \"✔ azemu is running with persistent cert at .azemu/cert-bundle.pem\"\n  fi\n"
    },
    "profile": {
      "common": "  azemu-start() {\n    echo \"▶ Building azemu...\"\n    go build -o bin/azemu ./cmd/azemu || return 1\n\n    echo \"▶ Starting azemu (ARM :4566, Metadata :4567)...\"\n    ./bin/azemu > /tmp/azemu.log 2>&1 &\n    sleep 2\n\n    if ! pgrep -f 'bin/azemu' >/dev/null 2>&1; then\n      echo \"✘ azemu failed to start; check /tmp/azemu.log\"\n      return 1\n    fi\n\n    # If this is the first start the cert bundle was just created at\n    # AZEMU_CERT_PATH (default .azemu/cert-bundle.pem). Walk the\n    # contributor through the one-time trust step. Subsequent starts\n    # reuse the same cert and skip this entirely.\n    if [ -f .azemu/cert-bundle.pem ] && ! security find-certificate -c 'azemu localhost' \\\n        ~/Library/Keychains/login.keychain-db 2>/dev/null \\\n        | grep -q \"$(openssl x509 -in .azemu/cert-bundle.pem -noout -fingerprint -sha1 | cut -d= -f2)\"; then\n      echo\n      echo \"ℹ One-time setup: trust the persistent azemu TLS cert.\"\n      echo \"  Run this once (will prompt for keychain password):\"\n      echo\n      echo \"  security add-trusted-cert -r trustRoot -p ssl \\\\\"\n      echo \"    -k ~/Library/Keychains/login.keychain-db \\\\\"\n      echo \"    .azemu/cert-bundle.pem\"\n      echo\n    fi\n\n    curl -sfk https://127.0.0.1:4567/metadata/endpoints 2>/dev/null \\\n      | jq '[.name, .resourceManager] | join(\" | ARM=\")' \\\n      || echo \"✘ Metadata unreachable\"\n  }\n\n  azemu-stop() {\n    pkill -f 'bin/azemu' 2>/dev/null && echo \"✔ azemu stopped\" || echo \"azemu was not running\"\n  }\n\n  azemu-status() {\n    if pgrep -f 'bin/azemu' >/dev/null 2>&1; then\n      echo \"✔ azemu running\"\n      curl -sfk https://127.0.0.1:4567/metadata/endpoints 2>/dev/null \\\n        | jq '[.name, .resourceManager] | join(\" | ARM=\")' 2>/dev/null || true\n    else\n      echo \"✘ azemu not running  (run: azemu-start)\"\n      return 1\n    fi\n  }\n\n  tf-init()   { azemu-status && terraform -chdir=\"$TF_DIR\" init; }\n  tf-plan()   { azemu-status && terraform -chdir=\"$TF_DIR\" plan; }\n  tf-apply()  { azemu-status && terraform -chdir=\"$TF_DIR\" apply -auto-approve; }\n  tf-destroy(){ azemu-status && terraform -chdir=\"$TF_DIR\" destroy -auto-approve; }\n\n  azemu-smoke() {\n    azemu-status\n    echo \"▶ Metadata...\"\n    curl -sfk https://127.0.0.1:4567/metadata/endpoints | jq .name\n    echo \"▶ Subscriptions...\"\n    curl -sfk \"https://127.0.0.1:4566/subscriptions?api-version=2022-12-01\" \\\n      | jq '.value[0].subscriptionId'\n    echo \"▶ Resource group create...\"\n    curl -sfk -X PUT \\\n      \"https://127.0.0.1:4566/subscriptions/00000000-0000-0000-0000-000000000000/resourcegroups/smoke?api-version=2023-07-01\" \\\n      -H 'Content-Type: application/json' \\\n      -d '{\"location\":\"uksouth\"}' | jq .name\n    echo \"✔ smoke passed\"\n  }\n\n  # Short aliases\n  alias ti=tf-init\n  alias ta=tf-apply\n  alias td=tf-destroy\n  alias tp=tf-plan\n  alias ts=azemu-status\n"
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "x86_64-linux"
      ]
    }
  },
