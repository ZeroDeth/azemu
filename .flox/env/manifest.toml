schema-version = "1.11.0"

# ─── Packages ────────────────────────────────────────────────────────────────────
[install]
go.pkg-path = "go"
terraform.pkg-path = "terraform"
terraform.version = "^1.14"
just.pkg-path = "just"
jq.pkg-path = "jq"
shellcheck.pkg-path = "shellcheck"
tflint.pkg-path = "tflint"
pre-commit.pkg-path = "pre-commit"

# ─── Environment variables ───────────────────────────────────────────────────────
[vars]
# azemu ports
AZEMU_ARM_PORT  = "4566"
AZEMU_META_PORT = "4567"

# Persistent TLS cert bundle path. azemu reads this on startup and reuses
# the cert+key across restarts so the contributor only has to add it to
# the system keychain once. See cmd/azemu/main.go and internal/auth/tls.go.
AZEMU_CERT_PATH = ".azemu/cert-bundle.pem"

# azurerm provider redirection — use the metadata_host mechanism. The
# earlier ARM_RESOURCE_MANAGER_ENDPOINT / ARM_ACTIVE_DIRECTORY_ENDPOINT
# overrides DO NOT WORK with azurerm v4.x: they are silently ignored and
# the provider falls through to real Microsoft login. Use 127.0.0.1
# instead of "localhost" to avoid IPv6 resolution issues documented in
# docs/TROUBLESHOOTING.md.
ARM_METADATA_HOSTNAME = "127.0.0.1:4567"

# Mock credentials (azemu accepts anything)
ARM_SUBSCRIPTION_ID = "00000000-0000-0000-0000-000000000000"
ARM_TENANT_ID       = "00000000-0000-0000-0000-000000000001"
ARM_CLIENT_ID       = "00000000-0000-0000-0000-000000000002"
ARM_CLIENT_SECRET   = "azemu-mock-secret"

# Working directory
TF_DIR = "test/terraform"

# ─── Hook: runs once when environment is activated ───────────────────────────────
[hook]
on-activate = '''
  # Ensure the persistent cert bundle directory exists. The bundle file
  # itself is generated by azemu on first start; the directory is
  # gitignored so each contributor's machine has its own.
  mkdir -p .azemu

  # Auto-install the project pre-commit hook into .git/hooks/pre-commit
  # the first time a contributor activates the env. Idempotent — running
  # again is a fast no-op.
  if [ -f .pre-commit-config.yaml ] && [ ! -f .git/hooks/pre-commit ]; then
    pre-commit install >/dev/null 2>&1 && \
      echo "✔ pre-commit hook installed (.git/hooks/pre-commit)" || \
      echo "✘ pre-commit install failed; run manually with: pre-commit install"
  fi

  # Convenience hint if azemu is already running and a cert bundle exists.
  if pgrep -f 'bin/azemu' >/dev/null 2>&1 && [ -f .azemu/cert-bundle.pem ]; then
    echo "✔ azemu is running with persistent cert at .azemu/cert-bundle.pem"
  fi
'''

# ─── Profile: helper functions and aliases ───────────────────────────────────────
[profile]
common = '''
  azemu-start() {
    echo "▶ Building azemu..."
    go build -o bin/azemu ./cmd/azemu || return 1

    echo "▶ Starting azemu (ARM :4566, Metadata :4567)..."
    ./bin/azemu > /tmp/azemu.log 2>&1 &
    sleep 2

    if ! pgrep -f 'bin/azemu' >/dev/null 2>&1; then
      echo "✘ azemu failed to start; check /tmp/azemu.log"
      return 1
    fi

    # If this is the first start the cert bundle was just created at
    # AZEMU_CERT_PATH (default .azemu/cert-bundle.pem). Walk the
    # contributor through the one-time trust step. Subsequent starts
    # reuse the same cert and skip this entirely.
    if [ -f .azemu/cert-bundle.pem ] && ! security find-certificate -c 'azemu localhost' \
        ~/Library/Keychains/login.keychain-db 2>/dev/null \
        | grep -q "$(openssl x509 -in .azemu/cert-bundle.pem -noout -fingerprint -sha1 | cut -d= -f2)"; then
      echo
      echo "ℹ One-time setup: trust the persistent azemu TLS cert."
      echo "  Run this once (will prompt for keychain password):"
      echo
      echo "  security add-trusted-cert -r trustRoot -p ssl \\"
      echo "    -k ~/Library/Keychains/login.keychain-db \\"
      echo "    .azemu/cert-bundle.pem"
      echo
    fi

    curl -sfk https://127.0.0.1:4567/metadata/endpoints 2>/dev/null \
      | jq '[.name, .resourceManager] | join(" | ARM=")' \
      || echo "✘ Metadata unreachable"
  }

  azemu-stop() {
    pkill -f 'bin/azemu' 2>/dev/null && echo "✔ azemu stopped" || echo "azemu was not running"
  }

  azemu-status() {
    if pgrep -f 'bin/azemu' >/dev/null 2>&1; then
      echo "✔ azemu running"
      curl -sfk https://127.0.0.1:4567/metadata/endpoints 2>/dev/null \
        | jq '[.name, .resourceManager] | join(" | ARM=")' 2>/dev/null || true
    else
      echo "✘ azemu not running  (run: azemu-start)"
      return 1
    fi
  }

  tf-init()   { azemu-status && terraform -chdir="$TF_DIR" init; }
  tf-plan()   { azemu-status && terraform -chdir="$TF_DIR" plan; }
  tf-apply()  { azemu-status && terraform -chdir="$TF_DIR" apply -auto-approve; }
  tf-destroy(){ azemu-status && terraform -chdir="$TF_DIR" destroy -auto-approve; }

  azemu-smoke() {
    azemu-status
    echo "▶ Metadata..."
    curl -sfk https://127.0.0.1:4567/metadata/endpoints | jq .name
    echo "▶ Subscriptions..."
    curl -sfk "https://127.0.0.1:4566/subscriptions?api-version=2022-12-01" \
      | jq '.value[0].subscriptionId'
    echo "▶ Resource group create..."
    curl -sfk -X PUT \
      "https://127.0.0.1:4566/subscriptions/00000000-0000-0000-0000-000000000000/resourcegroups/smoke?api-version=2023-07-01" \
      -H 'Content-Type: application/json' \
      -d '{"location":"uksouth"}' | jq .name
    echo "✔ smoke passed"
  }

  # Short aliases
  alias ti=tf-init
  alias ta=tf-apply
  alias td=tf-destroy
  alias tp=tf-plan
  alias ts=azemu-status
'''

# ─── Platforms ───────────────────────────────────────────────────────────────────
[options]
systems = ["aarch64-darwin", "x86_64-linux"]
