services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0
    environment:
      # Register every storage account name your Terraform creates, all with
      # the well-known Azurite dev key (azemu's listKeys returns that key for
      # any account). Keep devstoreaccount1 first: setting AZURITE_ACCOUNTS
      # disables the built-in default account unless it is listed explicitly.
      # Append your own accounts as ";<name>:<base64-key>" entries.
      AZURITE_ACCOUNTS: "devstoreaccount1:Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;examplestorage001:Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;azemuotasa:Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;azemuotadsa:Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw=="
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').createConnection(10000,'localhost').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: azemu-redis
    command: ["redis-server", "--requirepass", "azemu-dev-primary-key"]
    ports:
      - "6379:6379"
    profiles: ["redis"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "azemu-dev-primary-key", "ping"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 3s

  azemu:
    build: .
    image: azemu:dev
    ports:
      - "4566:4566"
      - "4567:4567"
      - "4568:4568"
    environment:
      AZEMU_CERT_PATH: /azemu/cert-bundle.pem
      AZEMU_METADATA_HOST: 127.0.0.1:4567
      AZEMU_AZURITE_ENDPOINT: http://azurite:10000
      AZEMU_REDIS_ENDPOINT: redis://azemu-redis:6379
    volumes:
      - ./.azemu:/azemu
    depends_on:
      azurite:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4568/health"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 3s

volumes:
  azurite-data:
