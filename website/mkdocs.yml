site_name: azemu
site_url: https://zerodeth.github.io/azemu
site_description: An open-source, local Azure emulator for Terraform, OpenTofu, and other Azure tooling
site_author: azemu contributors
repo_url: https://github.com/zerodeth/azemu
repo_name: zerodeth/azemu
edit_uri: edit/main/website/docs/
copyright: >
  Copyright &copy; 2026 azemu contributors. Released under the
  <a href="https://github.com/zerodeth/azemu/blob/main/LICENSE">MIT License</a>.
  azemu is a community project and is not affiliated with or endorsed by
  Microsoft, HashiCorp, or the OpenTofu project.

theme:
  name: material
  custom_dir: overrides
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/zerodeth/azemu
      name: azemu on GitHub
    - icon: fontawesome/solid/comments
      link: https://github.com/zerodeth/azemu/discussions
      name: Discussions
    - icon: fontawesome/solid/bug
      link: https://github.com/zerodeth/azemu/issues
      name: Issue tracker

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

nav:
  - Home: index.md
  - Getting Started:
      - Install: getting-started/install.md
      - Your First Apply: getting-started/first-apply.md
      - How It Works: getting-started/how-it-works.md
  - Concepts:
      - Architecture: concepts/architecture.md
      - ARM Fidelity: concepts/arm-fidelity.md
      - Parity Matrix: concepts/parity-matrix.md
      - Web Console: concepts/web-console.md
  - Resources:
      - Troubleshooting: resources/troubleshooting.md
      - Design notes:
          - resources/design-notes/0001-delegate-storage-data-plane-to-azurite.md
          - resources/design-notes/0002-azemu-plus-kind-for-aks-workload-deployments.md
          - resources/design-notes/0003-add-azure-cache-for-redis.md
          - resources/design-notes/0004-azure-devops-pipelines-scope.md
  - Community:
      - Contributing: community/contributing.md
      - Roadmap: community/roadmap.md
      - Code of Conduct: community/code-of-conduct.md
      - License & Forking: community/license.md
  - Reference:
      - Setup (Dev Env): reference/setup.md
      - Changelog: reference/changelog.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true
