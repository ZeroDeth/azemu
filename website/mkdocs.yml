site_name: azemu
site_url: https://zerodeth.github.io/azemu
site_description: A local Azure emulator for Terraform-first development
repo_url: https://github.com/zerodeth/azemu
repo_name: zerodeth/azemu

theme:
  name: material
  custom_dir: overrides
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started:
      - Install: getting-started/install.md
      - Your First Apply: getting-started/first-apply.md
      - How It Works: getting-started/how-it-works.md
  - Concepts:
      - Architecture: concepts/architecture.md
      - ARM Fidelity: concepts/arm-fidelity.md
      - Parity Matrix: concepts/parity-matrix.md
  - Resources:
      - Troubleshooting: resources/troubleshooting.md
      - Design Decisions:
          - resources/design-decisions/0001-delegate-storage-data-plane-to-azurite.md
  - Community:
      - Contributing: community/contributing.md
      - Roadmap: community/roadmap.md
      - Code of Conduct: community/code-of-conduct.md
  - Reference:
      - Setup (Dev Env): reference/setup.md
      - Changelog: reference/changelog.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true
