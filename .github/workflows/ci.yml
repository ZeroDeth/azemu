name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: go build
        run: go build -ldflags "-X main.Version=ci" -o bin/azemu ./cmd/azemu

      - name: Verify binary runs
        run: ./bin/azemu --version

  cross-build:
    name: Cross-compile (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Mirror the goreleaser builds matrix (.goreleaser.yml) so a
        # platform-specific compile break is caught here, not at release time.
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: go build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./cmd/azemu

  terraform-test:
    name: Terraform Scenarios
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v7

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.6"

      - name: Start azemu
        run: docker compose up -d --build

      - name: Wait for azemu health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4568/health > /dev/null 2>&1; then
              echo "azemu ready"
              break
            fi
            echo "waiting for azemu ($i/30)..."
            sleep 2
          done

      - name: Trust azemu TLS cert
        run: |
          for i in $(seq 1 15); do
            test -f .azemu/cert-bundle.pem && break || sleep 1
          done
          ./scripts/trust-cert.sh .azemu/cert-bundle.pem

      - name: Run terraform scenario tests
        run: make tf-test-scenarios

      - name: Stop azemu
        if: always()
        run: docker compose down -v
